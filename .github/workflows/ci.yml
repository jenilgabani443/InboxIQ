name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  validate:
    name: Build, Test and Verify
    runs-on: ubuntu-latest
    
    steps:
      - name: Stage 1 - Checkout repository
        uses: actions/checkout@v4
        
      - name: Stage 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Stage 3 - Install dependencies
        run: npm ci
        
      - name: Stage 4 - Environment preparation
        run: |
          # Use placeholder secrets for CI environment testing.
          # For production deployments, use GitHub Secrets: ${{ secrets.SECRET_NAME }}
          cp .env.example .env
          
      - name: Optional - Run linting
        run: npm run lint
        
      - name: Stage 5 - Run automated tests
        run: npm test
        
      - name: Generate test coverage
        run: npm run test:coverage
        
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          
      - name: Stage 6 - Docker Build Verification
        run: docker build -f docker/Dockerfile -t inboxiq-api:ci .

