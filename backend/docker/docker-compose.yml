services:
  # ── Application ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: inboxiq-api

    env_file:
      - ../.env

    restart: unless-stopped
    read_only: true
    init: true

    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 0777
      - type: tmpfs
        target: /app/logs
        tmpfs:
          mode: 0777

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    ports:
      - "5000:5000"

    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/inboxiq
      REDIS_URL: redis://redis:6379

      BCRYPT_ROUNDS: "10"
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "1000"

      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:5000"
      CLIENT_URL: http://localhost:3000

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - inboxiq-network

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0

    container_name: inboxiq-mongo

    restart: unless-stopped

    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - inboxiq-network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine

    container_name: inboxiq-redis

    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru

    volumes:
      - redis-data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - inboxiq-network

  # ── Redis Commander (Optional) ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest

    container_name: inboxiq-redis-gui

    restart: unless-stopped

    environment:
      REDIS_HOSTS: local:redis:6379

    ports:
      - "8081:8081"

    depends_on:
      - redis

    networks:
      - inboxiq-network

    profiles:
      - tools

volumes:
  mongo-data:
  redis-data:

networks:
  inboxiq-network:
    driver: bridge
